<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Communications 'Big Bang' — Andus Labs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'Archivo', system-ui, sans-serif; background: #1a064b; }

  @keyframes bbSpin   { to { transform: rotate(360deg); } }
  @keyframes bbPulse  { 0%,100% { transform: scale(1); opacity:.92; } 50% { transform: scale(1.05); opacity:1; } }
  @keyframes gradShift{ 0%,100%{ background-position:0% 50%; } 50%{ background-position:100% 50%; } }

  .hero {
    position: relative;
    overflow: hidden;
    background: #1a064b;
    color: #faf5ea;
    min-height: 780px;
    display: flex;
    align-items: center;
    padding: 56px clamp(40px, 6vw, 110px);
  }

  /* ── Big Bang texture container ── */
  .bb-texture {
    position: absolute;
    top: 50%;
    right: -8%;
    transform: translateY(-50%);
    width: min(72vw, 920px);
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }

  .bb-asterisk {
    position: absolute;
    width: 86%;
    height: 86%;
    opacity: 0.12;
    filter: brightness(0) saturate(100%) invert(60%) sepia(40%) saturate(2000%) hue-rotate(210deg);
    animation: bbSpin 120s linear infinite;
  }

  .bb-rings {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .bb-bars {
    position: absolute;
    inset: 0;
  }

  .bb-core {
    position: relative;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 34%, #ffffff 0%, #faf5ea 52%, #d9dbff 100%);
    box-shadow: 0 0 0 12px rgba(217,219,255,0.10), 0 0 90px 24px rgba(120,132,255,0.45);
    animation: bbPulse 5.5s cubic-bezier(0.65,0,0.35,1) infinite;
  }

  /* ── Scrim: solid violet left → transparent right ── */
  .bb-scrim {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background: linear-gradient(
      100deg,
      #1a064b 0%,
      #1a064b 30%,
      rgba(26,6,75,0.86) 46%,
      rgba(26,6,75,0.30) 64%,
      rgba(26,6,75,0) 80%
    );
  }

  /* ── Grain / paper texture ── */
  .bb-grain {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    opacity: 0.55;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    background-size: 220px 220px;
  }

  /* ── Editorial hairlines ── */
  .bb-hairlines {
    position: absolute;
    inset: 0;
    z-index: 4;
    pointer-events: none;
  }
  .bb-hairlines .h-vert {
    position: absolute;
    top: 0; bottom: 0;
    left: clamp(40px, 6vw, 110px);
    width: 1px;
    background: rgba(120,132,255,0.16);
  }
  .bb-hairlines .h-top {
    position: absolute;
    left: 0; right: 0;
    top: 56px;
    height: 1px;
    background: rgba(120,132,255,0.10);
  }
  .bb-hairlines .h-bot {
    position: absolute;
    left: 0; right: 0;
    bottom: 56px;
    height: 1px;
    background: rgba(120,132,255,0.10);
  }

  /* ── Brand bar ── */
  .bb-logo {
    position: absolute;
    top: 40px;
    left: clamp(40px, 6vw, 110px);
    height: 26px;
    z-index: 6;
  }
  .bb-fieldnote {
    position: absolute;
    top: 40px;
    right: clamp(40px, 6vw, 110px);
    z-index: 6;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(250,245,234,0.55);
  }

  /* ── Hero text ── */
  .bb-content {
    position: relative;
    z-index: 5;
    width: 100%;
    max-width: 1240px;
    margin: 0 auto;
  }
  .bb-inner { max-width: 640px; }

  .bb-eyebrow {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 30px;
  }
  .bb-eyebrow span {
    font-family: 'Archivo', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(250,245,234,0.6);
  }

  .bb-h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2.6rem, 4.4vw + 0.4rem, 5.4rem);
    line-height: 1.02;
    letter-spacing: -0.035em;
    margin: 0;
    color: #faf5ea;
    text-shadow: 0 2px 40px rgba(26,6,75,0.6);
  }
  .bb-h1 .accent { color: #aab2ff; }

  .bb-lead {
    font-family: 'Archivo', sans-serif;
    font-size: 1.1875rem;
    line-height: 1.55;
    color: rgba(250,245,234,0.78);
    max-width: 480px;
    margin: 30px 0 0;
  }

  .bb-ctas {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 42px;
    flex-wrap: wrap;
  }

  .btn-primary {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: -0.01em;
    color: #1a064b;
    background: #faf5ea;
    text-decoration: none;
    border: 2px solid #faf5ea;
    border-radius: 8px;
    padding: 13px 26px;
    transition: background 300ms cubic-bezier(0.22,1,0.36,1), color 300ms cubic-bezier(0.22,1,0.36,1);
    white-space: nowrap;
  }
  .btn-primary:hover {
    background: transparent;
    color: #faf5ea;
  }

  .btn-ghost {
    font-family: 'Archivo', sans-serif;
    font-weight: 500;
    font-size: 0.95rem;
    color: #aab2ff;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 120ms ease;
    white-space: nowrap;
  }
  .btn-ghost:hover { border-color: #aab2ff; }
</style>
</head>

<script>
  // Generate the radial fragment burst bars (deterministic seeded RNG)
  (function () {
    const palette = ['#d9dbff','#7884ff','#9aa6ff','#5b66e6','#c3c7ff','#aab2ff'];
    let seed = 13;
    const rnd = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
    const N = 128, inner = 112;
    const container = document.getElementById('bb-bars');
    const frag = document.createDocumentFragment();

    for (let i = 0; i < N; i++) {
      const angle = (i / N) * 360 + rnd() * 2.4;
      const r     = rnd();
      const len   = 28 + Math.pow(r, 1.5) * 150;
      const w     = 2 + rnd() * 8;
      const color = palette[Math.floor(rnd() * palette.length)];
      const op    = 0.45 + rnd() * 0.55;

      const el = document.createElement('div');
      el.style.cssText = [
        'position:absolute',
        'left:50%',
        'top:50%',
        `width:${w}px`,
        `height:${len}px`,
        `background:${color}`,
        `opacity:${op}`,
        'border-radius:1.5px',
        `transform:translate(-50%,-50%) rotate(${angle}deg) translateY(-${inner + len / 2}px)`,
      ].join(';');
      frag.appendChild(el);
    }
    container.appendChild(frag);
  })();
</script>
